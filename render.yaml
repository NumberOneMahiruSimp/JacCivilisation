services:
  - type: web
    name: jac-civilization-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: CORS_ORIGINS
        value: https://jac-civilization.onrender.com

  - type: static
    name: jac-civilization
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://jac-civilization-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
